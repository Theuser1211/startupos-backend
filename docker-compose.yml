services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: startupos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/startupos
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: change-this-to-a-very-long-secret-key-in-production
      NODE_ENV: development
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
  redisdata: